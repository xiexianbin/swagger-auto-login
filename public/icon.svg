<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变，增加现代感 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A8ACF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3069A7;stop-opacity:1" />
    </linearGradient>
    <!-- 投影效果 (模拟 Neumorphism/3D) -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 1. 背景容器 (圆角矩形) -->
  <rect x="64" y="64" width="896" height="896" rx="180" ry="180" fill="url(#bgGradient)" />

  <!-- 2. Swagger/API 花括号 (背景装饰，降低透明度) -->
  <g fill="#FFFFFF" fill-opacity="0.2" font-family="monospace" font-weight="bold" font-size="600" text-anchor="middle">
    <text x="280" y="720">{</text>
    <text x="744" y="720">}</text>
  </g>

  <!-- 3. 主体图标组 -->
  <g transform="translate(512, 512)" filter="url(#shadow)">
    <!-- 挂锁主体 -->
    <path d="M-160 -60 V-140 C-160 -228.3 -88.3 -300 0 -300 C88.3 -300 160 -228.3 160 -140 V-60 H180 C202.1 -60 220 -42.1 220 -20 V260 C220 282.1 202.1 300 180 300 H-180 C-202.1 300 -220 282.1 -220 260 V-20 C-220 -42.1 -202.1 -60 -180 -60 H-160 Z M-80 -60 H80 V-140 C80 -184.2 44.2 -220 0 -220 C-44.2 -220 -80 -184.2 -80 -140 V-60 Z" fill="#FFFFFF"/>
    
    <!-- 闪电 (代表 Auto) -->
    <path d="M20 -60 L-70 80 H-10 L-50 200 L60 50 H-10 L20 -60 Z" fill="#FFD700" stroke="#3069A7" stroke-width="10" stroke-linejoin="round"/>
  </g>
</svg>